bundle:
  name: pixels-install
  engine: direct

include:
  - targets.yml
  - resources/*.yml

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

variables:
  catalog:
    description: "Unity Catalog name"
    default: "main"
  schema:
    description: "Schema name"
    default: "pixels"
  table:
    default: "${var.catalog}.${var.schema}.object_catalog"
  volume_name:
    description: "Volume name for DICOM files"
    default: "pixels_volume"
  volume:
    default: "${var.catalog}.${var.schema}.${var.volume_name}"
  serving_endpoint_name:
    default: "pixels-monai-uc"
  scale_to_zero_enabled:
    description: "Whether the serving endpoint scales to zero when idle"
    type: complex
    default: true
  model_uc_name:
    default: "${var.catalog}.${var.schema}.monai_pixels_model"
  lakebase_instance_name:
    default: "pixels-lakebase"
  vlm_image_analysis:
    description: "Foundation model for VLM image analysis"
    default: "databricks-claude-sonnet-4"
  metadata_redaction:
    description: "Foundation model for DICOM metadata redaction"
    default: "databricks-llama-4-maverick"
  image_redaction:
    description: "Foundation model for DICOM image PHI redaction"
    default: "databricks-claude-3-7-sonnet"
  vector_search_embedding:
    description: "Embedding model for Genie vector search"
    default: "databricks-bge-large-en"
  sql_warehouse:
    lookup:
      warehouse: "Serverless Starter Warehouse"

sync:
  paths:
    - .
  include:
    - dist/*.whl
  exclude:
    - images/*.gif
    - apps/dicom-web/ohif/**/*
    - models/vista3d/**/*
    - notebooks/**/*
