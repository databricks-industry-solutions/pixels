resources:
  jobs:
    pixels_install:
      name: "Pixels Install"
      description: "Full Pixels stack installation: ingest, apps, model, dashboard, genie"
      timeout_seconds: 10800
      max_concurrent_runs: 1
      tags:
        accelerator: pixels
        group: HLS

      parameters:
        - name: path
          default: "s3://hls-eng-data-public/dicom/landing_zone/*.zip"
        - name: table
          default: ${var.table}
        - name: volume
          default: ${var.volume}
        - name: sqlWarehouseID
          default: ${var.sql_warehouse}
        - name: mode
          default: "append"
        - name: serving_endpoint_name
          default: ${var.serving_endpoint_name}
        - name: model_uc_name
          default: ${var.model_uc_name}
        - name: scale_to_zero_enabled
          default: ${var.scale_to_zero_enabled}
        - name: vlm_image_analysis
          default: ${var.vlm_image_analysis}
        - name: metadata_redaction
          default: ${var.metadata_redaction}
        - name: image_redaction
          default: ${var.image_redaction}
        - name: vector_search_embedding
          default: ${var.vector_search_embedding}
        - name: lakebase_instance_name
          default: ${var.lakebase_instance_name}

      tasks:
        # ── Initialize UC schema, volume, empty table ──────────────
        - task_key: init_schema
          notebook_task:
            notebook_path: ../install/init-schema.ipynb
            source: WORKSPACE
          max_retries: 0
          environment_key: serverless

        # ── Demo Data Ingest ───────────────────────────────────────
        - task_key: dcm_ingest
          notebook_task:
            notebook_path: ../install/dcm-demo.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: init_schema
          max_retries: 0
          environment_key: serverless

        # ── Mint app shells (creates SPs; no code deploy) ──────────
        - task_key: create_apps
          notebook_task:
            notebook_path: ../install/create-apps.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: init_schema
          max_retries: 1
          min_retry_interval_millis: 30000
          environment_key: serverless

        # ── Register Vista3D model in UC ───────────────────────────
        - task_key: register_model
          notebook_task:
            notebook_path: ../install/register-model.py
            source: WORKSPACE
          depends_on:
            - task_key: init_schema
          max_retries: 0
          environment_key: serverless

        # ── Deploy serving endpoint ────────────────────────────────
        - task_key: deploy_endpoint
          notebook_task:
            notebook_path: ../install/deploy-endpoint.py
            source: WORKSPACE
          depends_on:
            - task_key: register_model
          max_retries: 0
          environment_key: serverless

        # ── Validate endpoint with test inference ──────────────────
        - task_key: validate_model
          notebook_task:
            notebook_path: ../install/validate-model.py
            source: WORKSPACE
          depends_on:
            - task_key: deploy_endpoint
          max_retries: 0
          environment_key: serverless

        # ── Deploy Lakebase instance + reverse ETL sync ────────────
        - task_key: deploy_lakebase
          notebook_task:
            notebook_path: ../install/deploy-lakebase.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: dcm_ingest
          max_retries: 1
          min_retry_interval_millis: 30000
          environment_key: serverless

        # ── Package wheel + OHIF archive to Volume ─────────────────
        - task_key: deploy_prep
          notebook_task:
            notebook_path: ../install/deploy-prep.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: init_schema
          max_retries: 0
          environment_key: serverless

        # ── Deploy DICOMweb gateway app ────────────────────────────
        - task_key: deploy_gateway
          notebook_task:
            notebook_path: ../install/deploy-gateway.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: deploy_prep
            - task_key: deploy_grants
          max_retries: 1
          min_retry_interval_millis: 30000
          environment_key: serverless

        # ── Deploy OHIF viewer app ─────────────────────────────────
        - task_key: deploy_viewer
          notebook_task:
            notebook_path: ../install/deploy-viewer.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: deploy_gateway
            - task_key: validate_model
          max_retries: 1
          min_retry_interval_millis: 30000
          environment_key: serverless

        # ── Grant Lakebase + UC permissions ────────────────────────
        - task_key: deploy_grants
          notebook_task:
            notebook_path: ../install/deploy-grants.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: create_apps
            - task_key: deploy_lakebase
          max_retries: 1
          min_retry_interval_millis: 30000
          environment_key: serverless

        # ── Genie Space ────────────────────────────────────────────
        - task_key: genie_space
          notebook_task:
            notebook_path: ../install/genie-space.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: dcm_ingest
          max_retries: 0
          environment_key: serverless

        # ── Create STOW-RS processor job + permissions ─────────────
        - task_key: stow_processor
          notebook_task:
            notebook_path: ../install/stow-processor.ipynb
            source: WORKSPACE
          depends_on:
            - task_key: deploy_grants
          max_retries: 0
          environment_key: serverless

        # ── Post-install updates (dashboard params, thumbnails) ────
        - task_key: post_install_update
          notebook_task:
            notebook_path: ../install/post-install-update.py
            source: WORKSPACE
          depends_on:
            - task_key: deploy_viewer
            - task_key: genie_space
            - task_key: stow_processor
          max_retries: 0
          environment_key: serverless

        # ── Validate all services ──────────────────────────────────
        - task_key: validate_install
          notebook_task:
            notebook_path: ../install/validate-install.py
            source: WORKSPACE
          depends_on:
            - task_key: post_install_update
          max_retries: 12
          min_retry_interval_millis: 180000
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            environment_version: "4"
            dependencies:
              - -r ../requirements.txt
